<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul 3 - Peta Presensi Sesi</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-body: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 900px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group select {
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary);
            color: white;
            justify-content: center;
            width: 100%;
        }

        button:hover { background-color: var(--primary-hover); }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background-color: #9CA3AF !important;
        }

        .status-box {
            background: #F3F4F6;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
        }

        .status-ok { color: #059669; border-left: 3px solid #10B981; }
        .status-err { color: #DC2626; border-left: 3px solid #EF4444; }
        .status-wait { color: #6B7280; border-left: 3px solid #9CA3AF; }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #E0E7FF;
            color: #4338CA;
            margin-bottom: 10px;
        }
        
        #map {
            height: 450px;
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            border: 2px solid #E5E7EB;
            z-index: 1; /* Fix Leaflet z-index issue */
        }
        
        .map-stats {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            background: #F8FAFC;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
        }
        .stat-item {
            text-align: center;
        }
        .data-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .stat-val {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <span class="badge">📍 Dashboard Peta Dosen</span>
    </div>
    <h1>Modul 3: Peta Presensi Sesi</h1>
    <p style="text-align: center; color: #6B7280; margin-bottom: 25px; font-size: 14px;">
        Pilih sesi di bawah ini untuk melihat persebaran lokasi mahasiswa yang telah melakukan absensi.
    </p>

    <div class="input-group">
        <label for="session-select"><i class="fa-solid fa-list"></i> Pilih Sesi Aktif / Riwayat</label>
        <select id="session-select">
            <option value="">Memuat daftar sesi...</option>
        </select>
    </div>

    <div class="controls">
        <button id="btn-fetch"><i class="fa-solid fa-map-location-dot"></i> Tampilkan Peta Presensi</button>
    </div>
    
    <div id="status-sys" class="status-box status-wait">Sistem siap. Silakan pilih sesi dan klik tombol di atas.</div>

    <div class="map-stats">
        <div class="stat-item">
            <div class="data-label">Mahasiswa Hadir</div>
            <div id="stat-hadir" class="stat-val">0</div>
        </div>
        <div class="stat-item">
            <div class="data-label">Koordinat Terekam</div>
            <div id="stat-gps" class="stat-val">0</div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    // URL Web App GAS Hardcoded sesuai instruksi (sama dengan Modul 1 & 2)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxi9U-Fy-KBNtDDMZkpGCmAPNEpApeJh8q2kHLadbEi313CpOOPWpKHE35cwCJ-UBcS/exec";
    
    let map = null;
    let markersLayer = new L.LayerGroup();

    const elSelect = document.getElementById('session-select');
    const elStatusSys = document.getElementById('status-sys');
    const btnFetch = document.getElementById('btn-fetch');
    const statHadir = document.getElementById('stat-hadir');
    const statGps = document.getElementById('stat-gps');

    // -----------------------------------------------------
    // LIST SESSIONS
    // -----------------------------------------------------
    async function loadSessions() {
        try {
            updateStatus(elStatusSys, 'Mengunduh daftar sesi dari server...', 'wait');
            const res = await fetch(`${GAS_URL}?pathInfo=presence/session/all`);
            const json = await res.json();
            
            if (json.ok && json.data) {
                elSelect.innerHTML = '<option value="">-- Pilih Sesi --</option>';
                // Urutkan dari yang terbaru (asumsi baris di bawah adalah terbaru)
                const sessions = json.data.reverse();
                
                sessions.forEach(s => {
                    const opt = document.createElement('option');
                    // Simpan data sebagai JSON string
                    opt.value = JSON.stringify({ course_id: s.course_id, session_id: s.session_id });
                    
                    const date = new Date(s.tanggal).toLocaleDateString('id-ID');
                    let statusAktif = s.is_active ? '✅ Aktif' : '🔒 Ditutup';
                    opt.textContent = `${s.course_id} - ${s.session_id} (${date}) [${statusAktif}]`;
                    elSelect.appendChild(opt);
                });
                updateStatus(elStatusSys, 'Daftar sesi siap. Silakan pilih.', 'ok');
            } else {
                elSelect.innerHTML = '<option value="">Gagal memuat sesi</option>';
                updateStatus(elStatusSys, 'Kolom session kosong / error dari server', 'err');
            }
        } catch (error) {
            console.error('Fetch sessions failed:', error);
            elSelect.innerHTML = '<option value="">Terjadi kesalahan koneksi.</option>';
            updateStatus(elStatusSys, 'Gagal mengunduh daftar sesi dari server.', 'err');
        }
    }

    // -----------------------------------------------------
    // MAP INITIALIZATION (LEAFLET.JS)
    // -----------------------------------------------------
    function initMap() {
        // Default center ke ITS / Surabaya pusat
        map = L.map('map').setView([-7.2575, 112.7521], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors',
            maxZoom: 19
        }).addTo(map);

        markersLayer.addTo(map);
    }

    // -----------------------------------------------------
    // FETCH PRESENCE & PLOT
    // -----------------------------------------------------
    btnFetch.addEventListener('click', async () => {
        if(!elSelect.value) {
            alert('Silakan pilih sesi terlebih dahulu dari dropdown!');
            return;
        }

        const selData = JSON.parse(elSelect.value);
        const courseId = encodeURIComponent(selData.course_id);
        const sessionId = encodeURIComponent(selData.session_id);

        btnFetch.disabled = true;
        updateStatus(elStatusSys, 'Mengunduh data presensi & lokasi...', 'wait');

        try {
            const url = `${GAS_URL}?pathInfo=presence/list&course_id=${courseId}&session_id=${sessionId}`;
            const res = await fetch(url);
            const json = await res.json();

            if (json.ok && json.data) {
                // Bersihkan marker sebelumnya
                markersLayer.clearLayers();

                const students = json.data;
                const hadir = students.filter(s => s.status === 'checked_in');
                
                let countGps = 0;
                let latlngs = [];

                hadir.forEach(s => {
                    // Validasi: pastikan tipe lat & lng adalah number atau valid string
                    if(s.lat && s.lng) {
                        const lat = parseFloat(s.lat);
                        const lng = parseFloat(s.lng);
                        
                        // Periksa validity
                        if(!isNaN(lat) && !isNaN(lng)) {
                            countGps++;
                            const pos = [lat, lng];
                            latlngs.push(pos);

                            const marker = L.marker(pos);
                            marker.bindPopup(`
                                <div style="text-align:center;">
                                    <strong>${s.name}</strong><br>
                                    <span style="font-size:12px; color:#6B7280;">NIM: ${s.user_id}</span>
                                </div>
                            `);
                            markersLayer.addLayer(marker);
                        }
                    }
                });

                // Update Stats
                statHadir.textContent = hadir.length;
                statGps.textContent = countGps;

                if (latlngs.length > 0) {
                    // Fit bounds to all markers
                    const group = new L.featureGroup(markersLayer.getLayers());
                    map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 16 });
                    updateStatus(elStatusSys, `Berhasil menampilkan ${countGps} lokasi mahasiswa di peta.`, 'ok');
                } else {
                    updateStatus(elStatusSys, `Belum ada data GPS terekam di sesi ini. (${hadir.length} absen tanpa GPS)`, 'wait');
                }

            } else {
                updateStatus(elStatusSys, `Terjadi kesalahan internal server.`, 'err');
            }
        } catch (error) {
            console.error(error);
            updateStatus(elStatusSys, `Gagal menghubungi server.`, 'err');
        } finally {
            btnFetch.disabled = false;
        }
    });

    function updateStatus(el, text, type) {
        el.textContent = text;
        el.className = `status-box status-${type}`;
    }

    // Startup
    initMap();
    loadSessions();
</script>

</body>
</html>
