<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul 2 - Pemantauan Accelerometer Sesi</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --bg-body: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 25px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 900px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group select {
            padding: 10px 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary);
            color: white;
            justify-content: center;
            flex: 1;
        }

        button:hover { background-color: var(--primary-hover); }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background-color: #9CA3AF !important;
        }

        .btn-stop { background-color: var(--danger); }
        .btn-stop:hover:not(:disabled) { background-color: #DC2626; }

        .status-box {
            background: #F3F4F6;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
        }

        .status-ok { color: #059669; border-left: 3px solid #10B981; }
        .status-err { color: #DC2626; border-left: 3px solid #EF4444; }
        .status-wait { color: #6B7280; border-left: 3px solid #9CA3AF; }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #E0E7FF;
            color: #4338CA;
            margin-bottom: 10px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <span class="badge">📈 Dashboard Accelerometer</span>
    </div>
    <h1>Modul 2: Pemantauan Real-time Sesi</h1>
    <p style="text-align: center; color: #6B7280; margin-bottom: 25px; font-size: 14px;">
        Pilih sesi di bawah ini. Sistem akan menarik pergerakan perangkat (Magnitude X, Y, Z) dari seluruh mahasiswa yang hadir secara real-time.
    </p>

    <div class="input-group">
        <label for="session-select"><i class="fa-solid fa-list"></i> Pilih Sesi Aktif</label>
        <select id="session-select">
            <option value="">Memuat daftar sesi...</option>
        </select>
    </div>

    <div class="controls">
        <button id="btn-start"><i class="fa-solid fa-play"></i> Pantau Real-time</button>
        <button id="btn-stop" class="btn-stop" disabled><i class="fa-solid fa-stop"></i> Berhenti</button>
    </div>
    
    <div id="status-sys" class="status-box status-wait">Sistem siap. Silakan pilih sesi dan klik tombol "Pantau Real-time".</div>

    <div class="chart-container">
        <canvas id="accelChart"></canvas>
    </div>
</div>

<script>
    // URL Web App GAS Hardcoded
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxi9U-Fy-KBNtDDMZkpGCmAPNEpApeJh8q2kHLadbEi313CpOOPWpKHE35cwCJ-UBcS/exec";
    
    // UI Elements
    const elSelect = document.getElementById('session-select');
    const elStatusSys = document.getElementById('status-sys');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    
    // State Tracking
    let chart;
    let pollingInterval;
    let activeDatasets = {}; // Map user_id to dataset index
    let colorPalette = ['#EF4444', '#10B981', '#3B82F6', '#F59E0B', '#8B5CF6', '#EC4899', '#14B8A6', '#F43F5E', '#84CC16'];
    const MAX_HISTORY = 30; // Maksimum 30 titik untuk tiap pengguna di chart

    // -----------------------------------------------------
    // LIST SESSIONS
    // -----------------------------------------------------
    async function loadSessions() {
        try {
            updateStatus(elStatusSys, 'Mengunduh daftar sesi dari server...', 'wait');
            const res = await fetch(`${GAS_URL}?pathInfo=presence/session/all`);
            const json = await res.json();
            
            if (json.ok && json.data) {
                elSelect.innerHTML = '<option value="">-- Pilih Sesi --</option>';
                const sessions = json.data.reverse();
                
                sessions.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify({ course_id: s.course_id, session_id: s.session_id });
                    const date = new Date(s.tanggal).toLocaleDateString('id-ID');
                    let statusAktif = s.is_active ? '✅ Aktif' : '🔒 Ditutup';
                    opt.textContent = `${s.course_id} - ${s.session_id} (${date}) [${statusAktif}]`;
                    elSelect.appendChild(opt);
                });
                updateStatus(elStatusSys, 'Daftar sesi siap. Silakan pilih.', 'ok');
            } else {
                elSelect.innerHTML = '<option value="">Gagal memuat sesi</option>';
            }
        } catch (error) {
            console.error('Fetch sessions error:', error);
            updateStatus(elStatusSys, 'Gagal terhubung ke URL Google Apps Script.', 'err');
        }
    }

    // -----------------------------------------------------
    // CHART INITIALIZATION
    // -----------------------------------------------------
    function initChart() {
        const ctx = document.getElementById('accelChart').getContext('2d');
        if (chart) chart.destroy();
        activeDatasets = {};
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Akan diisi dengan waktu polling (tick ke-X)
                datasets: [] // Akan dipopulasikan otomatis per user aktif
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        min: 0, 
                        max: 20, 
                        title: { display: true, text: 'Total Aktivitas (Magnitude m/s²)' }
                    },
                    x: {
                        title: { display: true, text: 'Timeline Sinkronisasi' }
                    }
                },
                animation: { duration: 300 }, // Sedikit animasi untuk data transisi
                plugins: {
                    legend: { position: 'top' },
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        });
    }

    // -----------------------------------------------------
    // POLLING DATA
    // -----------------------------------------------------
    async function fetchAccelerometerData(sessionId) {
        try {
            const url = `${GAS_URL}?pathInfo=telemetry/accel/session&session_id=${encodeURIComponent(sessionId)}`;
            const res = await fetch(url);
            const json = await res.json();
            
            if (json.ok && json.data) {
                // Filter hanya data terupdate/terakhir per student (dari keseluruhan histori array di backend)
                const latestPerUser = {};
                json.data.forEach(d => {
                    latestPerUser[d.user_id] = d; 
                });

                const timeLabel = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                const labelsArray = chart.data.labels;
                if (labelsArray.length >= MAX_HISTORY) labelsArray.shift();
                labelsArray.push(timeLabel);

                const usersPresent = Object.keys(latestPerUser);
                let updateCount = 0;

                usersPresent.forEach(uid => {
                    // Cek jika dataset untuk mahasiswa ini sudah ada atau belum
                    if (activeDatasets[uid] === undefined) {
                        const newDs = {
                            label: latestPerUser[uid].name || uid,
                            borderColor: colorPalette[Object.keys(activeDatasets).length % colorPalette.length],
                            backgroundColor: colorPalette[Object.keys(activeDatasets).length % colorPalette.length],
                            data: new Array(labelsArray.length - 1).fill(null), // Pad titik masa lalu dengan null
                            tension: 0.3,
                            fill: false,
                            pointRadius: 2
                        };
                        chart.data.datasets.push(newDs);
                        activeDatasets[uid] = chart.data.datasets.length - 1;
                    }

                    const dsIdx = activeDatasets[uid];
                    const d = latestPerUser[uid];
                    
                    // Total percepatan / aktivitas: Root Mean Square dari x y z
                    const x = parseFloat(d.x) || 0;
                    const y = parseFloat(d.y) || 0;
                    const z = parseFloat(d.z) || 0;
                    const magnitude = Math.sqrt(x*x + y*y + z*z).toFixed(2);
                    
                    chart.data.datasets[dsIdx].data.push(magnitude);
                    updateCount++;
                });

                // Tarik & sinkronisasikan pergerseran semua data set (termsk yg tidak mengirim update di sesi ini)
                chart.data.datasets.forEach(ds => {
                    if (ds.data.length < labelsArray.length) {
                        ds.data.push(null); // Putusnya grafik jika loss connection
                    }
                    if (ds.data.length > MAX_HISTORY) {
                        ds.data.shift();
                    }
                });

                chart.update();
                updateStatus(elStatusSys, `[LIVE] Menerima update grafik pergerakan dari ${updateCount} mahasiswa.`, 'ok');
            }
        } catch (error) {
            console.error('Polling error:', error);
            updateStatus(elStatusSys, 'Gangguan koneksi saat polling data...', 'err');
        }
    }

    // -----------------------------------------------------
    // EVENT LISTENERS
    // -----------------------------------------------------
    btnStart.addEventListener('click', () => {
        if(!elSelect.value) {
            alert('Silakan pilih sesi terlebih dahulu dari dropdown!');
            return;
        }

        const selData = JSON.parse(elSelect.value);
        
        btnStart.disabled = true;
        btnStop.disabled = false;
        elSelect.disabled = true;
        
        initChart();
        updateStatus(elStatusSys, 'Memulai sinkronisasi Real-time...', 'wait');
        
        // Panggil fetch pertama
        fetchAccelerometerData(selData.session_id);
        
        // Loop polling tiap 3 detik
        pollingInterval = setInterval(() => {
            fetchAccelerometerData(selData.session_id);
        }, 3000);
    });

    btnStop.addEventListener('click', () => {
        clearInterval(pollingInterval);
        
        btnStart.disabled = false;
        btnStop.disabled = true;
        elSelect.disabled = false;
        
        updateStatus(elStatusSys, 'Pemantauan dihentikan.', 'wait');
    });

    function updateStatus(el, text, type) {
        el.textContent = text;
        el.className = `status-box status-${type}`;
    }

    // Startup
    loadSessions();
    initChart();

</script>

</body>
</html>
