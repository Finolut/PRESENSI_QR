<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modul 3 - GPS Tracker Murni</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        :root {
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --danger: #DC2626;
            --danger-hover: #B91C1C;
            --bg-body: #F1F5F9;
            --card-bg: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 25px max(30px, 4vw);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 900px;
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            padding: 10px 12px;
            border: 1px solid #CBD5E1;
            border-radius: 8px;
            font-size: 15px;
            background: #fff;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background-color: #94A3B8 !important;
        }

        .status-box {
            background: #F8FAFC;
            padding: 10px 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            font-family: monospace;
            text-align: center;
        }

        .status-ok { color: #059669; border-left: 3px solid #10B981; background: #ECFDF5; }
        .status-err { color: #DC2626; border-left: 3px solid #EF4444; background: #FEF2F2; }
        .status-wait { color: #64748B; border-left: 3px solid #94A3B8; }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            background: #DBEAFE;
            color: #1E40AF;
            margin-bottom: 10px;
        }
        
        #map {
            height: 400px;
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            border: 2px solid #E2E8F0;
            z-index: 1; 
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <span class="badge">📍 Tracker Modul 3</span>
    </div>
    <h1>Telemetry GPS Tracker</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 25px; font-size: 14px;">
        Aplikasi ini berfungsi membaca kordinat GPS anda secara periodik (setiap 10 detik) dan memetakannya sesuai dokumen Kontrak API.
    </p>

    <div class="input-group">
        <label for="device-id-input"><i class="fa-solid fa-mobile-screen"></i> Device ID Target</label>
        <input type="text" id="device-id-input" placeholder="Misal: DEV-12345" required>
        <small style="color: #64748B; margin-top: 5px;">Masukkan ID unik perangkat Anda.</small>
    </div>

    <div class="controls">
        <button id="btn-start" class="btn-primary"><i class="fa-solid fa-play"></i> Mulai Tracking</button>
        <button id="btn-stop" class="btn-danger" disabled><i class="fa-solid fa-stop"></i> Berhenti</button>
    </div>
    
    <div id="status-sys" class="status-box status-wait">Sistem siap. Masukkan Device ID dan mulai tracking.</div>

    <!-- Map Container -->
    <div id="map"></div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    // URL Web App GAS Hardcoded sesuai instruksi
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxi9U-Fy-KBNtDDMZkpGCmAPNEpApeJh8q2kHLadbEi313CpOOPWpKHE35cwCJ-UBcS/exec";
    
    let map = null;
    let markerLayer = null; // Menyimpan marker "latest"
    let polylineLayer = null; // Menyimpan jalur "history"
    let trackingIntervalId = null;
    let isTracking = false;

    const elDeviceId = document.getElementById('device-id-input');
    const elStatusSys = document.getElementById('status-sys');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');

    // -----------------------------------------------------
    // MAP INITIALIZATION (LEAFLET.JS)
    // -----------------------------------------------------
    function initMap() {
        // Default center ke ITS / Surabaya pusat
        map = L.map('map').setView([-7.2575, 112.7521], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors',
            maxZoom: 19
        }).addTo(map);
    }

    // -----------------------------------------------------
    // TRACKING LOGIC
    // -----------------------------------------------------

    btnStart.addEventListener('click', () => {
        const devId = elDeviceId.value.trim();
        if (!devId) {
            alert('Silakan masukkan Device ID terlebih dahulu!');
            return;
        }

        if (!navigator.geolocation) {
            alert('Browser Anda tidak mensupport fitur Geolocation.');
            return;
        }

        isTracking = true;
        elDeviceId.disabled = true;
        btnStart.disabled = true;
        btnStop.disabled = false;
        
        updateStatus(elStatusSys, 'Memulai tracker... menunggu lokasi pertama', 'wait');

        // Jalankan siklus pertama segera
        processGPSCycle(devId);

        // Ulangi setiap 10 detik
        trackingIntervalId = setInterval(() => {
            processGPSCycle(devId);
        }, 10000);
    });

    btnStop.addEventListener('click', () => {
        isTracking = false;
        if (trackingIntervalId) clearInterval(trackingIntervalId);
        
        elDeviceId.disabled = false;
        btnStart.disabled = false;
        btnStop.disabled = true;
        
        updateStatus(elStatusSys, 'Tracking dihentikan.', 'wait');
    });

    function processGPSCycle(deviceId) {
        if (!isTracking) return;

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const acc = position.coords.accuracy;

                try {
                    // 1. POST Data ke Backend (/telemetry/gps)
                    const payload = {
                        device_id: deviceId,
                        ts: new Date().toISOString(), // ISO-8601
                        lat: parseFloat(lat.toFixed(6)),
                        lng: parseFloat(lng.toFixed(6)),
                        accuracy_m: Math.round(acc)
                    };

                    await fetch(`${GAS_URL}?pathInfo=telemetry/gps`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    updateStatus(elStatusSys, `Koordinat terekam! (Acc: ${Math.round(acc)}m). Memfetch peta...`, 'wait');

                    // 2. Refresh elemen peta (Marker /Latest & Polyline /History)
                    await drawMapElements(deviceId);

                } catch (err) {
                    console.error('Network Error:', err);
                    updateStatus(elStatusSys, `Gagal menghubungi server pada siklus ini.`, 'err');
                }
            },
            (error) => {
                console.warn('GPS Error:', error.message);
                updateStatus(elStatusSys, `Gagal membaca GPS: ${error.message} (Pastikan izin Lokasi / Location nyala)`, 'err');
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
        );
    }

    async function drawMapElements(deviceId) {
        try {
            // A. Fetch History untuk render Polyline
            const historyRes = await fetch(`${GAS_URL}?pathInfo=telemetry/gps/history&device_id=${encodeURIComponent(deviceId)}&limit=100`);
            const historyJson = await historyRes.json();
            
            let pathCoordinates = [];
            if (historyJson.ok && historyJson.data && historyJson.data.items) {
                pathCoordinates = historyJson.data.items.map(item => [item.lat, item.lng]);
                
                // Gambar/Update Polyline
                if (polylineLayer) map.removeLayer(polylineLayer);
                if (pathCoordinates.length > 0) {
                    polylineLayer = L.polyline(pathCoordinates, { color: '#2563EB', weight: 4, opacity: 0.8 }).addTo(map);
                }
            }

            // B. Fetch Latest untuk render Marker
            const latestRes = await fetch(`${GAS_URL}?pathInfo=telemetry/gps/latest&device_id=${encodeURIComponent(deviceId)}`);
            const latestJson = await latestRes.json();
            
            if (latestJson.ok && latestJson.data) {
                const latestData = latestJson.data;
                const pos = [latestData.lat, latestData.lng];
                
                // Gambar/Update Marker Murni
                if (markerLayer) map.removeLayer(markerLayer);
                
                markerLayer = L.marker(pos).addTo(map);
                markerLayer.bindPopup(`
                    <div style="text-align:center;">
                        <strong>Device ID: ${latestData.device_id}</strong><br>
                        <span style="font-size:12px; color:#64748B;">
                          Waktu: ${new Date(latestData.ts).toLocaleTimeString()}<br>
                          Akurasi: ${latestData.accuracy_m} m
                        </span>
                    </div>
                `).openPopup();
                
                // Posisikan center layar supaya mengikuti titik terakhir
                map.setView(pos, 16);
            }

            updateStatus(elStatusSys, `Peta terakhir diperbarui: ${new Date().toLocaleTimeString()} (Tracking Jalan Aktif)`, 'ok');

        } catch (err) {
            console.error('Fetch map data error', err);
        }
    }

    function updateStatus(el, text, type) {
        el.textContent = text;
        el.className = `status-box status-${type}`;
    }

    // Startup
    initMap();

</script>

</body>
</html>
